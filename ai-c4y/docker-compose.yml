version: "3.8"

networks:
  ai-agentic-chat:
    driver: bridge

services:
  orchestra-chat:
    ports:
      - 9000:8001
    build:
      context: .
      dockerfile: Dockerfile.orchestra
    env_file:
      - .env
    networks:
      - ai-agentic-chat
    restart: unless-stopped

  bvms-rag-chat:
    ports:
      - 9001:8001
    build:
      context: .
      dockerfile: Dockerfile.bvms
    env_file:
      - .env
    networks:
      - ai-agentic-chat
    restart: unless-stopped
