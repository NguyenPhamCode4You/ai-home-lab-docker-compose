version: "3.8"

networks:
  ai-agentic-chat:
    driver: bridge

services:
  orchestra-chat:
    ports:
      - 9000:8001
    build:
      context: .
      dockerfile: Dockerfile.orchestra
    env_file:
      - .env
    networks:
      - ai-agentic-chat
    restart: unless-stopped

  bvms-rag-chat:
    ports:
      - 9001:8001
    build:
      context: .
      dockerfile: Dockerfile.bvms
    env_file:
      - .env
    networks:
      - ai-agentic-chat
    restart: unless-stopped

  bvms-code-rag-chat:
    ports:
      - 9002:8001
    build:
      context: .
      dockerfile: Dockerfile.bvms_code
    env_file:
      - .env
    environment:
      TOKENS_LENGTH: 80000
      CHARS_PER_TOKEN: 30
      OLLAMA_GENERAL_MODEL: qwen2.5-coder:7b
      OLLAMA_CODE_MODEL: qwen2.5-coder:7b
      OPENROUTER_MAX_TOKENS: 120000
      OPENROUTER_NO_THINK: true
    networks:
      - ai-agentic-chat
    restart: unless-stopped
